<div class="">
  <div class="main-container">
    <header class="header-text">
      <h1>¿Tienes una Cuenta?</h1>
      <p>Inicia Sesion en Sonara</p>
    </header>
    <div class="signup-card">
      <h2>Log In</h2>
      <form (ngSubmit)="onSubmit()">
        <div class="input-group-custom">
          <label for="username" alt="Nombre de Usuario">Nombre de Usuario</label>
          <input type="text" [(ngModel)]="username" name="username" id="username" required>
        </div>
        <div class="input-group-custom">
          <label for="password">Contraseña</label>
          <input type="password" [(ngModel)]="password" name="password" id="password" required="">
        </div>
        <button type="submit" class="btn-register">Iniciar Sesion</button>
      </form>
      <div class="my-2">
        <a href="http://">¿Olvidaste la contraseña?</a>
      </div>
      <div class="my-2">
        <a href="http://">¿Olvidaste el nombre de usuario?</a>
      </div>
      <p *ngIf="error" class="error-message">{{ error }}</p>
    </div>
    <div class="cuenta-centro py-3">
      <h4>¿No tienes una cuenta?</h4>
      <button class="btn-register">Registrate</button>
    </div>
  </div>
</div>
