<div >
    <div class="main-container">
        <header class="header-text">
            <h1>¿No tienes una Cuenta?</h1>
            <p>Registrate facilmente en Sonara</p>
        </header>
        <div class="signup-card">
            <h2>Sign Up</h2>
            <form>
                <div class="input-group-custom">
                    <label for="username" alt="Nombre de Usuario">Nombre de Usuario</label>
                    <input type="text" name="username" id="username" required>
                </div>
                <div class="input-group-custom">
                    <label for="Email">Correo Electronico</label>
                    <input type="email" name="Email" id="Email" required>
                </div>
                <div class="input-group-custom">
                    <label for="password">Contraseña</label>
                    <input type="password" name="password" id="password">
                </div>
                <div class="input-group-custom">
                    <label for="repeatPassword">Repite la Contraseña</label>
                    <input type="password" name="password" id="repeatPassword">
                </div>
                <div class="input-group-custom">
                    <label for="dateOfBirth">Fecha de Nacimiento</label>
                    <input type="date" name="dateOfBirth" id="dateOfBirth">
                </div>
                <button type="submit" class="btn-register">Registrarse</button>
            </form>
        </div>
    </div>
</div>
