<section class="artists-container">
    <div class="title-row">
        <h2>Administración de Artistas</h2>
        <div class="actions">
            <a routerLink="/admin/artists/new" class="btn btn-cyan">
                <i class="bi bi-music-note-beamed"></i> Nuevo Artista
            </a>
            <span class="meta">Total: <strong>{{ totalElements }}</strong></span>
        </div>
    </div>

    @if (loading) {
        <div class="loading-overlay">
            <p class="info">Cargando artistas...</p>
        </div>
    }

    <div class="table-responsive">
        <table mat-table [dataSource]="dataSource" matSort class="artists-table">

            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
                <td mat-cell *matCellDef="let a">{{ a.id }}</td>
            </ng-container>

            <ng-container matColumnDef="nombre">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
                <td mat-cell *matCellDef="let a">{{ a.nombre }}</td>
            </ng-container>

            <ng-container matColumnDef="genero_id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Género ID</th>
                <td mat-cell *matCellDef="let a">{{ a.generoId || 'Sin género' }}</td>
            </ng-container>

            <ng-container matColumnDef="votos_ranking">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Votos</th>
                <td mat-cell *matCellDef="let a">
                    <span class="badge bg-secondary">{{ a.votosRanking }}</span>
                </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Acciones</th>
                <td mat-cell *matCellDef="let a">
                    <div class="btn-group btn-group-sm">
                        <a [routerLink]="['/admin/artists', a.id]" class="btn btn-outline-info">Ver</a>
                        <a [routerLink]="['/admin/artists', a.id, 'edit']" class="btn btn-outline-primary">Editar</a>
                        <button 
                            type="button" 
                            class="btn btn-outline-danger"
                            (click)="deleteArtist(a.id, a.nombre)">
                            Borrar
                        </button>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
    </div>
</section>
