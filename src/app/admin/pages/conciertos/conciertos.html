<section class="tickets-container">
    <div class="title-row">
        <h2>Administración de Conciertos</h2>
        <div class="actions">
            <a routerLink="/admin/concierto/new" class="btn btn-cyan">
                <i class="bi bi-ticket-perforated"></i> Nuevo Concierto
            </a>
            <span class="meta">Total: <strong>{{ totalElements }}</strong></span>
        </div>
    </div>

    @if (loading) {
    <div class="loading-overlay">
        <p class="info">Cargando conciertos...</p>
    </div>
    }

    <div class="table-responsive">
        <table mat-table [dataSource]="dataSource" matSort class="tickets-table">

            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
                <td mat-cell *matCellDef="let c">{{ c.id }}</td>
            </ng-container>

            <ng-container matColumnDef="artista_nombre">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Artista</th>
                <td mat-cell *matCellDef="let c">
                    <strong>{{ c.nombre }}</strong>
                    <small class="d-block text-muted">Nombre: {{ c.artista.nombre }}</small>
                </td>
            </ng-container>

            <ng-container matColumnDef="fecha_hora">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha y Hora</th>
                <td mat-cell *matCellDef="let c">{{ c.fechaHora | date:'medium' }}</td>
            </ng-container>

            <ng-container matColumnDef="local">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Local/Recinto</th>
                <td mat-cell *matCellDef="let c">{{ c.local }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Acciones</th>
                <td mat-cell *matCellDef="let c">
                    <div class="btn-group btn-group-sm">
                        <a [routerLink]="['/admin/concierto', c.id]" class="btn btn-outline-info">Ver</a>
                        <a [routerLink]="['/admin/concierto', c.id, 'edit']" class="btn btn-outline-primary">Editar</a>
                        <button type="button" class="btn btn-outline-danger"
                            (click)="deleteConcierto(c.id, c.artistaNombre)">
                            Borrar
                        </button>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
        <mat-paginator [length]="totalElements" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 25, 100]"
            [pageIndex]="currentPage" (page)="onPageChange($event)" aria-label="Seleccionar página de conciertos">
        </mat-paginator>
    </div>
</section>
