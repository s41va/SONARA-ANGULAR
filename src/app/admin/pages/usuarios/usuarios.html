<section class="users-container">
    <div class="title-row">
        <h2>Administración de Usuarios</h2>
        <div class="actions">
            <a routerLink="/admin/users/new" class="btn btn-cyan">
                <i class="bi bi-person-plus"></i> Nuevo Usuario
            </a>
            <span class="meta">Total: <strong>{{ totalElements }}</strong></span>
        </div>
    </div>

    @if (loading) {
        <div class="loading-overlay">
            <p class="info">Cargando usuarios...</p>
        </div>
    }

    <div class="table-responsive">
        <table mat-table [dataSource]="dataSource" matSort class="users-table">

            <ng-container matColumnDef="usuario_id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
                <td mat-cell *matCellDef="let u">{{ u.usuario_id }}</td>
            </ng-container>

            <ng-container matColumnDef="nombre">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
                <td mat-cell *matCellDef="let u">{{ u.nombre }}</td>
            </ng-container>

            <ng-container matContainerColumnDef="email">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
                <td mat-cell *matCellDef="let u">{{ u.email }}</td>
            </ng-container>

            <ng-container matColumnDef="localidad_id">
                <th mat-header-cell *matHeaderCellDef>Localidad</th>
                <td mat-cell *matCellDef="let u">{{ u.localidad_id || 'N/A' }}</td>
            </ng-container>

            <ng-container matColumnDef="fecha_registro">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Registro</th>
                <td mat-cell *matCellDef="let u">{{ u.fecha_registro | date:'shortDate' }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Acciones</th>
                <td mat-cell *matCellDef="let u">
                    <div class="btn-group btn-group-sm">
                        <a [routerLink]="['/admin/users', u.usuario_id]" class="btn btn-outline-info">Ver</a>
                        <a [routerLink]="['/admin/users', u.usuario_id, 'edit']" class="btn btn-outline-primary">Editar</a>
                        <button
                            type="button"
                            class="btn btn-outline-danger"
                            (click)="deleteUser(u.usuario_id, u.nombre)">
                            Borrar
                        </button>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
    </div>
</section>
